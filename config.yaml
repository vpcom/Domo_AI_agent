# Main application configuration for Domo.

debug:
  enabled: false

paths:
  data_root: data
  inputs_root: data/inputs
  jobs_root: data/inputs/jobs
  documents_root: data/inputs/documents
  cvs_root: data/inputs/cvs
  outputs_root: data/outputs
  logs_root: data/outputs/logs

ollama:
  base_url: http://localhost:11434
  generate_path: /api/generate
  model: mistral
  timeout_seconds: 120
  max_retries: 1
  failure_threshold: 3
  circuit_open_seconds: 60

job_workflow:
  subprocess_timeout_seconds: 300

prompt_overrides:
  run_job_agent:
    - role
    - location
    - ignore_location
    - remote_only
  create_job_files: []
  match_cv: []

job_search:
  role: Full Stack Engineer
  location: Zurich
  ignore_location: false
  remote_only: false

  sources:
    - greenhouse
    - lever
    - ashby

  companies:
    greenhouse:
      - stripe
      - shopify
      - notion
    lever:
      - figma
      - segment
    ashby:
      - openai
      - scaleai

  max_jobs: 2
  max_results_per_source: 5
  max_company_attempts_per_source: 15
