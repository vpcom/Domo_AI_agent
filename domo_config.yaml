# Main application configuration for Domo.
# This is the single human-readable config file the app loads.

debug:
  enabled: false

paths:
  data_root: data
  jobs_root: data/jobs
  outputs_root: data/outputs
  cvs_root: data/cvs
  logs_root: data/logs

ollama:
  base_url: http://localhost:11434
  generate_path: /api/generate
  model: mistral
  timeout_seconds: 120
  max_retries: 1
  failure_threshold: 3
  circuit_open_seconds: 60

job_workflow:
  subprocess_timeout_seconds: 300

job_search:
  role: Full Stack Engineer
  location: Zurich

  sources:
    - greenhouse
    - lever
    - ashby

  companies:
    greenhouse:
      - stripe
      - shopify
      - notion
    lever:
      - figma
      - segment
    ashby:
      - openai
      - scaleai

  max_jobs: 2
  max_results_per_source: 5
  max_company_attempts_per_source: 15
